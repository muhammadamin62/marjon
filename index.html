<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aesthetic Spiritual Gift</title>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; overflow: hidden; font-family: 'Times New Roman', serif; user-select: none; }

.video-bg {
  position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
  display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr;
  z-index: 1; opacity: 0.6; pointer-events: none;
}
.video-bg video { width: 100%; height: 100%; object-fit: cover; }

#envelope-container {
  position: fixed; width: 90px; height: 60px;
  z-index: 100; display: block; cursor: pointer;
  will-change: left, top;
}

.envelope {
  position: relative; width: 100%; height: 100%;
  background: #fdf5e6; border-radius: 4px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.5);
  display: flex; align-items: center; justify-content: center;
}

.envelope::before {
  content: ''; position: absolute; top: 0; width: 0; height: 0;
  border-left: 45px solid transparent; border-right: 45px solid transparent;
  border-top: 35px solid #d4c4a8; z-index: 2;
}

.heart-seal { color: #e91e63; font-size: 18px; z-index: 3; }

.photo-stack {
  position: fixed; top: 45%; left: 50%; transform: translate(-50%, -50%);
  width: 280px; height: 380px; display: none; z-index: 200;
}

.photo-wrapper {
  position: absolute; width: 100%; height: 100%;
  transition: all 0.7s cubic-bezier(0.2, 1, 0.3, 1);
  display: flex; flex-direction: column; align-items: center;
  pointer-events: none;
}

.photo-wrapper.active-wrapper { pointer-events: auto; }

.photo-card {
  position: relative; width: 100%; height: 85%;
  background-size: cover; background-position: center;
  border: 10px solid #fff;
  box-shadow: 0 20px 50px rgba(0,0,0,0.9);
  background-color: #fff;
  overflow: hidden;
}

.photo-card video { width: 100%; height: 100%; object-fit: cover; }

.allah-text {
  margin-top: 15px; font-size: 24px; color: #FFD700; font-weight: bold;
  text-shadow: 0 0 15px gold; 
  opacity: 0; 
  transform: translateY(30px) scale(0.8);
  transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  text-align: center;
  width: 120%;
}

.active-wrapper .allah-text { 
  opacity: 1; 
  transform: translateY(0) scale(1);
  animation: floatText 3s infinite ease-in-out;
}

@keyframes floatText {
  0%, 100% { transform: translateY(0) scale(1); }
  50% { transform: translateY(-5px) scale(1.05); }
}

.particle {
  position: fixed; font-size: 26px; pointer-events: none; z-index: 3000;
  animation: explode 1.2s ease-out forwards;
}

@keyframes explode {
  0% { transform: translate(0,0) scale(0.5); opacity: 1; }
  100% { transform: translate(var(--x), var(--y)) scale(1.6) rotate(var(--r)); opacity: 0; }
}

#final-msg {
  position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
  width: 90%; text-align: center; color: #FFD700; font-size: 28px;
  font-weight: bold; z-index: 500; display: none; text-shadow: 0 0 20px gold;
}

.restart-btn {
  margin-top: 25px; padding: 12px 25px; font-size: 18px; 
  background: gold; border: none; border-radius: 50px;
  cursor: pointer; font-weight: bold; color: #000;
  box-shadow: 0 5px 15px gold; transition: 0.3s;
}

.photo-wrapper:nth-child(1n) { transform: rotate(-5deg); }
.photo-wrapper:nth-child(2n) { transform: rotate(4deg); }
.photo-wrapper:nth-child(3n) { transform: rotate(-2deg); }
.photo-wrapper:nth-child(4n) { transform: rotate(3deg); }
.photo-wrapper.fly { transform: translateY(-120vh) rotate(25deg) !important; opacity: 0; pointer-events: none; }

.status { position: fixed; bottom: 20px; width: 100%; text-align: center; color: #fff; font-size: 14px; z-index: 50; opacity: 0.6; }
</style>
</head>
<body>

<audio id="bg-music" loop><source src="music.mp3" type="audio/mpeg"></audio>
<audio id="click-sound"><source src="click.mp3" type="audio/mpeg"></audio>

<div class="video-bg">
  <video muted loop playsinline><source src="vid1.webm" type="video/webm"></video>
  <video muted loop playsinline><source src="vid2.webm" type="video/webm"></video>
  <video muted loop playsinline><source src="vid3.webm" type="video/webm"></video>
  <video muted loop playsinline><source src="vid4.webm" type="video/webm"></video>
</div>

<div id="envelope-container">
  <div class="envelope"><div class="heart-seal">❤️</div></div>
</div>

<div class="photo-stack" id="p-stack">
  <div class="photo-wrapper"><div class="photo-card" style="background-image:url('img10.jpg')"></div><div class="allah-text">Oycha😚</div></div>
  <div class="photo-wrapper"><div class="photo-card" style="background-image:url('img9.jpg')"></div><div class="allah-text">Chip va Deyl 3 qism</div></div>
  <div class="photo-wrapper"><div class="photo-card" style="background-image:url('img8.jpg')"></div><div class="allah-text">Chip va Deyl 2 qism</div></div>
  <div class="photo-wrapper"><div class="photo-card" style="background-image:url('img7.jpg')"></div><div class="allah-text">Qor qizcha😊</div></div>
  <div class="photo-wrapper"><div class="photo-card" style="background-image:url('img6.jpg')"></div><div class="allah-text">Jigar soch😊</div></div>
  <div class="photo-wrapper"><div class="photo-card" style="background-image:url('img5.jpg')"></div><div class="allah-text">Jigar kuzlar🤭</div></div>
  <div class="photo-wrapper"><div class="photo-card" style="background-image:url('img4.jpg')"></div><div class="allah-text">3*4 rasm😂</div></div>
  <div class="photo-wrapper"><div class="photo-card"><video muted loop playsinline><source src="vid_extra2.webm" type="video/webm"></video></div><div class="allah-text">Krinj moment</div></div>
  <div class="photo-wrapper"><div class="photo-card" style="background-image:url('img3.jpg')"></div><div class="allah-text">Kulishingdan😊</div></div>
  <div class="photo-wrapper"><div class="photo-card" style="background-image:url('img2.jpg')"></div><div class="allah-text">Chip va Deyl😅</div></div>
  <div class="photo-wrapper"><div class="photo-card"><video muted loop playsinline><source src="vid_extra1.webm" type="video/webm"></video></div><div class="allah-text">Krinj moment</div></div>
  <div class="photo-wrapper active-wrapper"><div class="photo-card" style="background-image:url('img1.jpg')"></div><div class="allah-text">Uzimni maktabm</div></div>
</div>

<div id="final-msg">
  <p>Vdni tashlab qoyish esdan chiqmasin 😚☺</p>
  <button class="restart-btn" onclick="restart()">Qaytadan ko'rish 🔄</button>
</div>

<div class="status" id="hint">BIRINCHI MANI BOS! ✉️</div>

<script>
const bgMusic = document.getElementById('bg-music');
const clickSound = document.getElementById('click-sound');
const envelope = document.getElementById('envelope-container');
const pStack = document.getElementById('p-stack');
const finalMsg = document.getElementById('final-msg');
const videos = document.querySelectorAll('video');

let caught = false;
let ex = Math.random() * (window.innerWidth - 90);
let ey = Math.random() * (window.innerHeight - 60);
let edx = 6, edy = 6; 

function explosion(x, y) {
  for (let i = 0; i < 12; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.innerHTML = Math.random() > 0.4 ? '😚' : '❤️';
    p.style.left = x + 'px'; p.style.top = y + 'px';
    p.style.setProperty('--x', (Math.random() - 0.5) * 450 + 'px');
    p.style.setProperty('--y', (Math.random() - 0.5) * 450 + 'px');
    p.style.setProperty('--r', Math.random() * 360 + 'deg');
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 1200);
  }
}

function move() {
  if (caught) return;
  ex += edx; ey += edy;
  if (ex + 90 > window.innerWidth || ex < 0) edx *= -1;
  if (ey + 60 > window.innerHeight || ey < 0) edy *= -1;
  envelope.style.left = ex + 'px'; envelope.style.top = ey + 'px';
  requestAnimationFrame(move);
}
move();

document.addEventListener('visibilitychange', () => {
  if (document.hidden) bgMusic.pause();
  else if (caught) bgMusic.play().catch(() => {});
});

document.body.onclick = function(e) {
  bgMusic.play().catch(() => {});
  videos.forEach(v => v.play().catch(() => {}));
  clickSound.currentTime = 0;
  clickSound.play().catch(() => {});
  explosion(e.clientX, e.clientY);
};

// KONVERTNI USHLASH QISMI TIKLANDI
envelope.onclick = (e) => {
  e.stopPropagation();
  caught = true;
  explosion(e.clientX, e.clientY);
  envelope.style.transition = "0.7s all ease";
  envelope.style.transform = "scale(0.1)";
  envelope.style.opacity = "0";

  setTimeout(() => {
    envelope.style.display = "none";
    pStack.style.display = "block";
    document.getElementById('hint').style.display = "none";
  }, 700);
};

pStack.onclick = (e) => {
  e.stopPropagation();
  explosion(e.clientX, e.clientY);

  const wrappers = Array.from(pStack.querySelectorAll('.photo-wrapper:not(.fly)'));
  if (wrappers.length === 0) return;

  const top = wrappers[wrappers.length - 1];
  top.classList.add('fly');
  top.classList.remove('active-wrapper');

  if (wrappers.length > 1) {
    const next = wrappers[wrappers.length - 2];
    next.classList.add('active-wrapper');
    const nextVid = next.querySelector('video');
    if (nextVid) nextVid.play();
  } else {
    setTimeout(() => {
      pStack.style.display = 'none';
      finalMsg.style.display = 'block';
    }, 800);
  }
};

function restart() {
  finalMsg.style.display = 'none';
  const all = pStack.querySelectorAll('.photo-wrapper');
  all.forEach((w, i) => {
    w.classList.remove('fly', 'active-wrapper');
    if (i === 0) w.classList.add('active-wrapper'); // img1 eng pastda bo'lsa
  });
  
  // Tartibni to'g'irlash uchun eng ustki elementga qayta active beramiz
  const activeNow = pStack.querySelectorAll('.photo-wrapper:not(.fly)');
  activeNow[activeNow.length - 1].classList.add('active-wrapper');
  
  pStack.style.display = 'block';
  bgMusic.currentTime = 0;
  bgMusic.play().catch(() => {});
}
</script>

</body>
</html>
