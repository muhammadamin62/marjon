<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aesthetic Spiritual Gift</title>

<meta http-equiv="Content-Security-Policy" content="default-src * 'unsafe-inline' 'unsafe-eval' data: blob:; connect-src * 'unsafe-inline' blob:; img-src * data: blob:; media-src * data: blob:; worker-src blob:;">

<script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; overflow: hidden; font-family: 'Times New Roman', serif; user-select: none; }

/* 🎬 VIDEOLAR */
.video-bg {
  position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
  display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr;
  z-index: -1; opacity: 0.35; pointer-events: none;
}
.video-bg video { width: 100%; height: 100%; object-fit: cover; background: #000; }

/* 📦 SOVG'A QUTISI KONTEYNERI (MUHIM!) */
#box-container {
  position: fixed; 
  width: 150px; 
  height: 150px;
  z-index: 100; 
  cursor: pointer;
  left: 50%;
  top: 50%;
}

.photo-stack {
  position: fixed; top: 45%; left: 50%; transform: translate(-50%, -50%);
  width: 280px; height: 380px; display: none; z-index: 200;
}

.photo-wrapper {
  position: absolute; width: 100%; height: 100%;
  transition: all 0.7s cubic-bezier(0.2, 1, 0.3, 1);
  display: flex; flex-direction: column; align-items: center;
}

.photo-card {
  position: relative; width: 100%; height: 85%;
  background-size: cover; background-position: center;
  border: 10px solid #fff;
  box-shadow: 0 20px 50px rgba(0,0,0,0.9);
}

.view-btn {
  position: absolute; bottom: 10px; right: 10px;
  background: #fff; width: 35px; height: 35px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; cursor: pointer; z-index: 10; border: none;
}

.allah-text {
  margin-top: 15px; font-size: 28px; color: #FFD700; font-weight: bold;
  text-shadow: 0 0 15px gold; opacity: 0; transform: translateY(20px);
  transition: 0.6s;
}

.active-wrapper .allah-text { opacity: 1; transform: translateY(0); }

.particle {
  position: fixed; font-size: 26px; pointer-events: none; z-index: 3000;
  animation: explode 1.2s ease-out forwards;
}

@keyframes explode {
  0% { transform: translate(0,0) scale(0.5); opacity: 1; }
  100% { transform: translate(var(--x), var(--y)) scale(1.6) rotate(var(--r)); opacity: 0; }
}

#final-msg {
  position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
  width: 90%; text-align: center; color: #FFD700; font-size: 28px;
  font-weight: bold; z-index: 500; display: none; cursor: pointer;
  text-shadow: 0 0 20px gold;
}

.photo-wrapper.fly { transform: translateY(-120vh) rotate(25deg) !important; opacity: 0; }

.zoom-active {
  position: fixed !important; top: 50% !important; left: 50% !important;
  width: 95vw !important; height: 80vh !important;
  transform: translate(-50%, -50%) rotate(0deg) !important; z-index: 1000 !important;
}

.status { position: fixed; bottom: 20px; width: 100%; text-align: center; color: #fff; font-size: 14px; z-index: 50; opacity: 0.6; }
</style>
</head>
<body>

<audio id="bg-music" loop preload="auto"><source src="music.mp3" type="audio/mpeg"></audio>
<audio id="click-sound" preload="auto"><source src="click.mp3" type="audio/mpeg"></audio>

<div class="video-bg">
  <video autoplay muted loop playsinline><source src="vid1.webm" type="video/webm"></video>
  <video autoplay muted loop playsinline><source src="vid2.webm" type="video/webm"></video>
  <video autoplay muted loop playsinline><source src="vid3.webm" type="video/webm"></video>
  <video autoplay muted loop playsinline><source src="vid4.webm" type="video/webm"></video>
</div>

<div id="box-container">
  <model-viewer 
    id="gift-3d" 
    src="model.glb" 
    auto-rotate 
    shadow-intensity="1" 
    style="width: 100%; height: 100%;">
  </model-viewer>
</div>

<div class="photo-stack" id="p-stack">
  <div class="photo-wrapper"><div class="photo-card" style="background-image:url('img1.jpg')"><button class="view-btn">👁</button></div><div class="allah-text">MARJOOOOON</div></div>
  <div class="photo-wrapper"><div class="photo-card" style="background-image:url('img10.jpg')"><button class="view-btn">👁</button></div><div class="allah-text">MARJOOOOON</div></div>
</div>

<div id="final-msg">Vdni tashlab qoyish esdan chiqmasin 😚☺</div>
<div class="status" id="hint">EKRANGA BOSING VA SOVG'ANI TUTING! 📦</div>

<script>
const bgMusic = document.getElementById('bg-music');
const clickSound = document.getElementById('click-sound');
const box = document.getElementById('box-container');
const pStack = document.getElementById('p-stack');
const finalMsg = document.getElementById('final-msg');
const videos = document.querySelectorAll('video');

let caught = false;
let bx = Math.random() * (window.innerWidth - 150);
let by = Math.random() * (window.innerHeight - 150);
let bdx = 5, bdy = 5;

// Portlash funksiyasi (Emotsiyalar)
function explosion(x, y) {
  const fragment = document.createDocumentFragment();
  for (let i = 0; i < 15; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.innerHTML = Math.random() > 0.5 ? '😚' : '❤️';
    p.style.left = x + 'px';
    p.style.top = y + 'px';
    p.style.setProperty('--x', (Math.random() - 0.5) * 500 + 'px');
    p.style.setProperty('--y', (Math.random() - 0.5) * 500 + 'px');
    p.style.setProperty('--r', Math.random() * 360 + 'deg');
    fragment.appendChild(p);
    setTimeout(() => p.remove(), 1200);
  }
  document.body.appendChild(fragment);
}

function move() {
  if (caught) return;
  bx += bdx; by += bdy;
  if (bx + 150 > window.innerWidth || bx < 0) bdx *= -1;
  if (by + 150 > window.innerHeight || by < 0) bdy *= -1;
  box.style.left = bx + 'px'; box.style.top = by + 'px';
  requestAnimationFrame(move);
}

move();

// Birinchi marta ekranga bosganda musiqa va videolarni "uyg'otish"
window.addEventListener('click', function firstClick(e) {
  bgMusic.play().catch(err => console.log("Music play blocked"));
  videos.forEach(v => v.play());
  
  // Emotsiyalarni chiqaramiz
  explosion(e.clientX, e.clientY);
  
  // Bu funksiya faqat bir marta ishlashi kerak
  window.removeEventListener('click', firstClick);
}, { once: false }); // 'once: false' bo'lsa, har safar klikda portlash ishlaydi

// Har qanday klikda emotsiya chiqishi uchun alohida:
document.body.onclick = (e) => {
    clickSound.currentTime = 0;
    clickSound.play().catch(() => {});
    explosion(e.clientX, e.clientY);
};

box.onclick = (e) => {
  e.stopPropagation();
  caught = true;
  box.style.transition = "0.7s all cubic-bezier(0.175, 0.885, 0.32, 1.275)";
  box.style.left = "50%"; box.style.top = "50%";
  box.style.transform = "translate(-50%, -50%) scale(1.8)";

  setTimeout(() => {
    box.style.opacity = "0";
    pStack.style.display = "block";
    document.getElementById('hint').style.display = "none";
    setTimeout(() => box.style.display = "none", 500);
  }, 1000);
};

// ... (Pstack va boshqa funksiyalar qoladi) ...
</script>
</body>
</html>
