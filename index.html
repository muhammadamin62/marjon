<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src * 'unsafe-inline' 'unsafe-eval' data: blob:; connect-src * 'unsafe-inline' blob:; img-src * data: blob:; media-src * data: blob:; script-src * 'unsafe-inline' 'unsafe-eval';">
    
    <title>Marjoon Special Gift</title>

    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; overflow: hidden; font-family: sans-serif; }
        
        .video-bg {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            display: grid; grid-template-columns: 1fr 1fr; opacity: 0.3; z-index: 1;
        }
        video { width: 100%; height: 100%; object-fit: cover; }

        #box-container {
            position: absolute; width: 200px; height: 200px;
            z-index: 100; cursor: pointer;
        }

        .photo-stack {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 300px; height: 400px; display: none; z-index: 200;
        }
        .photo-wrapper {
            position: absolute; width: 100%; height: 100%;
            border: 10px solid white; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: 0.5s; background-size: cover; background-position: center;
        }
        .fly { transform: translateY(-120vh) rotate(20deg) !important; opacity: 0; }
        
        #final-msg {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: gold; font-size: 24px; text-align: center; display: none; z-index: 300;
        }
    </style>
</head>
<body>

    <audio id="music" loop><source src="music.mp3"></audio>

    <div class="video-bg">
        <video muted loop playsinline><source src="vid1.mp4"></video>
        <video muted loop playsinline><source src="vid2.mp4"></video>
        <video muted loop playsinline><source src="vid3.mp4"></video>
        <video muted loop playsinline><source src="vid4.mp4"></video>
    </div>

    <div id="box-container">
        <model-viewer 
            src="model.glb" 
            id="model"
            auto-rotate 
            shadow-intensity="1" 
            loading="eager"
            camera-controls
            touch-action="none"
            style="width: 100%; height: 100%;">
        </model-viewer>
    </div>

    <div class="photo-stack" id="stack">
        <div class="photo-wrapper" style="background-image:url('img1.jpg')"></div>
        <div class="photo-wrapper" style="background-image:url('img2.jpg')"></div>
        <div class="photo-wrapper" style="background-image:url('img3.jpg')"></div>
        <div class="photo-wrapper" style="background-image:url('img4.jpg')"></div>
        <div class="photo-wrapper" style="background-image:url('img5.jpg')"></div>
        <div class="photo-wrapper" style="background-image:url('img6.jpg')"></div>
        <div class="photo-wrapper" style="background-image:url('img7.jpg')"></div>
        <div class="photo-wrapper" style="background-image:url('img8.jpg')"></div>
        <div class="photo-wrapper" style="background-image:url('img9.jpg')"></div>
        <div class="photo-wrapper" style="background-image:url('img10.jpg')"></div>
    </div>

    <div id="final-msg">Vdni tashlab qoyish esdan chiqmasin 😚☺</div>

    <script>
        const box = document.getElementById('box-container');
        const stack = document.getElementById('stack');
        const music = document.getElementById('music');
        const vids = document.querySelectorAll('video');

        // Quti harakati
        let x = 50, y = 50, dx = 2, dy = 2;
        function move() {
            if(box.style.display === 'none') return;
            x += dx; y += dy;
            if(x > window.innerWidth - 200 || x < 0) dx *= -1;
            if(y > window.innerHeight - 200 || y < 0) dy *= -1;
            box.style.left = x + 'px';
            box.style.top = y + 'px';
            requestAnimationFrame(move);
        }
        move();

        // Qutini bosganda
        box.onclick = () => {
            music.play();
            vids.forEach(v => v.play());
            box.style.display = 'none';
            stack.style.display = 'block';
        };

        // Rasmlarni bosganda
        stack.onclick = () => {
            const photos = stack.querySelectorAll('.photo-wrapper:not(.fly)');
            if(photos.length > 0) {
                photos[photos.length - 1].classList.add('fly');
            }
            if(photos.length === 1) {
                document.getElementById('final-msg').style.display = 'block';
            }
        };
    </script>
</body>
</html>
